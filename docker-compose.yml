services:
  db:
    image: mysql:8.0
    container_name: supplier-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "3306:3306"  # Для отладки

  supplier-sync:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  supplier-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    command: ["node", "dist/cli/worker.js"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  supplier-admin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    command: ["node", "dist/server/adminServer.js"]
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    command: ["npx", "knex", "migrate:latest", "--knexfile", "knexfile.cjs"]
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
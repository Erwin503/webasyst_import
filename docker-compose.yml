services:
  db:
    image: mysql:8.0
    container_name: supplier-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=supplier_db
      - MYSQL_USER=supplier_user
      - MYSQL_PASSWORD=supplier123
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "3306:3306" # Для отладки

  supplier-sync:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  supplier-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["node", "dist/cli/worker.js"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  supplier-admin:
    build:
      build:
    context: .
    dockerfile: Dockerfile
  environment:
    - MYSQL_HOST=db
    - MYSQL_PORT=3306
    - MYSQL_USER=supplier_user # ← меняем с root на supplier_user
    - MYSQL_PASSWORD=supplier123 # ← пароль для supplier_user
    - MYSQL_DATABASE=supplier_db
    - MYSQL_ROOT_PASSWORD=root123
    - MYSQL_ENABLED=true
  volumes:
    - ./data:/app/data
  command: ["node", "dist/server/adminServer.js"]
  ports:
    - "3000:3000"
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["npx", "knex", "migrate:latest", "--knexfile", "knexfile.cjs"]
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

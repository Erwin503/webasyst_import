services:
  db:
    image: mysql:8.0
    container_name: supplier-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "root123"
      MYSQL_DATABASE: "supplier_db"
      MYSQL_USER: "supplier_user"
      MYSQL_PASSWORD: "supplier123"
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:

  supplier-sync:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  supplier-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    command: ["node", "dist/cli/worker.js"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  supplier-admin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
    command: ["node", "dist/server/adminServer.js"]
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    command: ["npx", "knex", "migrate:latest", "--knexfile", "knexfile.cjs"]
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy

